name: Secret scan

# Re-enabled 2026-05-02 after switching from gitleaks/gitleaks-action@v2
# (which requires a paid licence for organisations) to the standalone
# gitleaks binary, which is free under MIT.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --source . \
            --no-banner \
            --redact \
            --verbose \
            --exit-code 1
