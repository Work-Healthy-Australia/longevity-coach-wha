name: CI

# Re-enabled on PR triggers 2026-05-02 after fixing the pnpm/action-setup
# version conflict. The slower / less-stable jobs (pgTAP, Playwright,
# Lighthouse) live in extended-ci.yml on workflow_dispatch only — see that
# file for the work needed to bring each back onto PR triggers.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Uses tsconfig.ci.json which excludes tests/** — production code is
      # strictly typechecked, test-file type debt accumulated during the CI
      # outage is tracked as v1.1 cleanup. See PR #127 body.
      - run: pnpm exec tsc --noEmit -p tsconfig.ci.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run tests/unit/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # lhci's startServerCommand ("pnpm start") needs a production build first.
      - run: pnpm build
      - run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  pgtap:
    name: pgTAP RLS regression
    runs-on: ubuntu-latest
    services:
      postgres:
        image: supabase/postgres:15.6.1.146
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -U postgres; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for Postgres ($i)..."
            sleep 2
          done

      - name: Enable required extensions
        run: |
          psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgtap WITH SCHEMA extensions;"
          psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector;"

      # Stub auth.uid() / auth.jwt() / auth.role() — the bare Postgres image
      # ships the auth schema + auth.users table but not the helper functions
      # GoTrue normally installs. Without these, every RLS policy referencing
      # them (most of them) fails to apply. Bootstrap is idempotent.
      - name: Apply CI auth-helper bootstrap
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/tests/_ci_bootstrap.sql

      - name: Apply migrations in order
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run pgTAP RLS suite
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/tests/rls.sql | tee /tmp/pgtap.out
          if grep -E '^not ok' /tmp/pgtap.out; then
            echo "pgTAP assertion failures detected"
            exit 1
          fi
