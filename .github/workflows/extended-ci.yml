name: Extended CI (manual)

# These jobs are NOT enabled on PR triggers because each has an outstanding
# infrastructure problem that needs fixing before it can run cleanly.
# Run via the Actions tab → Run workflow when needed for spot-checks.
#
# What blocks each job from going back on PR triggers:
#
# playwright
#   - Tests need a fully wired Supabase + signed-in seed user — currently
#     none of the secrets in the workflow are populated, so even on a
#     clean run the tests would fail at sign-in.
#   - Fix: provision a `longevity-coach-test` Supabase project with a
#     known fixture user, store the URL + publishable key + service-role
#     key as repo secrets, then re-enable on PR.
#   - Owner: TBD. Tracked under Epic 14.
#
on:
  workflow_dispatch:

jobs:
  playwright:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

